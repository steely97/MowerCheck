<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MowerCheck</title>
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0b3d2e" />

  <!-- iOS / Install -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MowerCheck">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

  <div class="app-container">

    <!-- Header -->
    <header class="header">
      <h1>MowerCheck</h1>
    </header>

    <!-- DASHBOARD -->
    <main id="dashboard" class="view active">

      <section class="welcome-card">
        <h2>Welcome back 👋</h2>
        <p id="lastInspection">Last inspection: None yet</p>
      </section>

      <section class="card-grid">

        <div class="card primary" id="newInspectionBtn">
          <div class="card-icon icon-green">
            <i data-lucide="clipboard-check"></i>
          </div>
          <h3>New Inspection</h3>
          <p>Start a new machine check</p>
        </div>

        <div class="card" id="manageMachinesBtn">
          <div class="card-icon icon-blue">
            <i data-lucide="tractor"></i>
          </div>
          <h3>Manage Machines</h3>
          <p>Add or remove machines</p>
        </div>

        <div class="card" id="historyBtn">
          <div class="card-icon icon-orange">
            <i data-lucide="history"></i>
          </div>
          <h3>History</h3>
          <p>View past inspections</p>
        </div>

        <div class="card" id="settingsBtn">
          <div class="card-icon icon-grey">
            <i data-lucide="settings"></i>
          </div>
          <h3>Settings</h3>
          <p>App preferences</p>
        </div>

      </section>

    </main>

    <!-- MACHINES -->
    <main id="machinesView" class="view">
      <div class="view-header">
        <button class="back-btn" data-target="dashboard">← Back</button>
        <h2>Machines</h2>
      </div>

      <div class="form-group">
        <input type="text" id="machineName" placeholder="Machine name" />
        <input type="text" id="fleetNumberInput" placeholder="Fleet number" />
        <button id="addMachineBtn" class="primary-btn" type="button">
          Add Machine
        </button>
      </div>

      <ul id="machineList" class="list"></ul>
    </main>

    <!-- INSPECTION -->
    <main id="inspectionView" class="view">
      <div class="view-header">
        <button class="back-btn" data-target="dashboard">← Back</button>
        <h2>New Inspection</h2>
      </div>

      <div class="form-group">
        <label>Select Machine</label>
        <select id="inspectionMachine"></select>
      </div>

      <div class="form-group">
        <label>Operator</label>
        <input type="text" id="operatorName" readonly />
      </div>

      <div class="form-group">
        <label>Fleet Number</label>
        <input type="text" id="fleetNumber" readonly />
      </div>

      <div class="form-group">
        <label>Hour Meter</label>
        <input type="number" id="hourMeter" />
      </div>

      <!-- NEXT BUTTON -->
      <button id="nextInspectionBtn" class="primary-btn" type="button" disabled>
        Next
      </button>

      <!-- CHECKLIST -->
      <div id="checklistContainer"></div>

    </main>

    <!-- HISTORY -->
    <main id="historyView" class="view">
      <div class="view-header">
        <button class="back-btn" data-target="dashboard">← Back</button>
        <h2>History</h2>
      </div>

      <ul id="historyList" class="list"></ul>
    </main>

    <!-- SETTINGS -->
    <main id="settingsView" class="view">
      <div class="view-header">
        <button class="back-btn" data-target="dashboard">← Back</button>
        <h2>Settings</h2>
      </div>
<div class="settings-item">
  <button id="installAppBtn" class="primary-btn" style="display:none;">
    Install App
  </button>
</div>
      <div class="settings-item">
        <button id="clearDataBtn" class="danger-btn" type="button">
          Clear All Data
        </button>
      </div>
    </main>

  </div>

  <!-- Scripts -->
  <script src="app.js" defer></script>
  <script src="machines.js" defer></script>
  <script src="inspection.js" defer></script>
  <script src="history.js" defer></script>
  <script src="settings.js" defer></script>

  <!-- Activate Icons -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.lucide) {
        lucide.createIcons();
      }
    });
  </script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>

</body>
</html>
