<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MowerCheck</title>

    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="style.css">

    <meta name="theme-color" content="#1b5e20">

</head>

<body>

<header>

    <h1>🚜 MowerCheck</h1>

    <div class="info">

        <p><strong>Machine:</strong> Ransomes MP653XC</p>

        <p><strong>Fleet No:</strong> 00010</p>

        <p><strong>Operator:</strong> Adam</p>

    </div>

</header>

<main>

<section id="home">

<button id="newCheck">

Start Morning Check

</button>

<button id="viewHistory">

View History

</button>

</section>

<section id="checkForm" class="hidden">

<h2>Morning Inspection</h2>

<label>Hour Meter</label>

<input type="number" id="hours" placeholder="Enter hours">

<div id="checklist">

</div>

<label>Notes</label>

<textarea id="notes" rows="5"></textarea>

<button id="saveCheck">

Save Inspection

</button>

<button id="cancel">

Back

</button>

</section>

<section id="history" class="hidden">

<h2>Inspection History</h2>

<div id="historyList"></div>

<button id="backHome">

Back

</button>

</section>

</main>

<script src="app.js"></script>

</body>

</html>
